name: Sync Labels (shared)
permissions:
  contents: read
  issues: write

on:
  # Run manually from the Actions tab
  workflow_dispatch:
  # Optional: keep labels fresh automatically
  schedule:
    - cron: '0 0 * * 1' # 00:00 on Monday

jobs:
  sync-labels:
    uses: basher83/.github/.github/workflows/sync-labels.yml@fb577a622754c6bd45f18a759f0dc1de699a3ac5 # main
    # No inputs: uses the default label_definitions_url from the shared workflow
